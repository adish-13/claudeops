{{ define "workspace_card" }}
<a href="/epics/{{ .EpicSlug }}/workspaces/{{ .Slug }}" style="display: block; padding: 7px 10px; border-radius: 6px; color: var(--fg); margin-bottom: 2px; {{ if .Active }}background: var(--hover); color: var(--accent);{{ end }}">
  <div style="display: flex; align-items: center; justify-content: space-between; gap: 6px;">
    <span style="font-size: 12px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">{{ .Name }}</span>
    <span style="display: flex; gap: 4px; flex-shrink: 0;">
      {{ if .Added }}<span class="stat-add">+{{ .Added }}</span>{{ end }}
      {{ if .Removed }}<span class="stat-del">-{{ .Removed }}</span>{{ end }}
    </span>
  </div>
  <div style="display: flex; align-items: center; justify-content: space-between; margin-top: 2px;">
    <span style="color: var(--warm); font-family: ui-monospace, monospace; font-size: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">{{ .BranchName }}</span>
    <span style="display: flex; gap: 5px; align-items: center;">
      {{ if .HasPR }}<span class="pill ok" style="font-size:9px; padding:0 5px;">PR</span>{{ end }}
      <span style="color: var(--dim); font-size: 10px;">{{ .NumSessions }}s</span>
    </span>
  </div>
</a>
{{ end }}

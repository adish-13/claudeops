{{ define "content" }}
<header>
  <div class="crumb"><a href="/">home</a> / <a href="/epics/{{ .Epic.Slug }}">{{ .Epic.Name }}</a> / new workspace</div>
  <h2>New workspace under {{ .Epic.Name }}</h2>
</header>

<form method="POST" action="/epics/{{ .Epic.Slug }}/workspaces" class="card">
  <label>Workspace name</label>
  <input type="text" name="name" placeholder="snappable rewrite" required>
  <label>Slug (lowercase, dashes — used in branch + path)</label>
  <input type="text" name="slug" placeholder="snappable-rewrite" required>
  <label>Branch name (auto-suggested; edit if you want)</label>
  <input type="text" name="branch_name" placeholder="{{ .SuggestedBranch }}" value="{{ .SuggestedBranch }}" required>
  <label>Worktree path (auto-suggested)</label>
  <input type="text" name="worktree_path" value="{{ .SuggestedPath }}" required>
  <p style="color:var(--muted); font-size:12px; margin:14px 0 0;">
    On submit: <code>git worktree add -b {branch} {path} {{ .Epic.BaseBranch }}</code>
  </p>
  <div class="actions" style="margin-top:14px;"><button type="submit">Create workspace</button></div>
</form>
{{ end }}

{{ define "layout" }}
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>{{ .Title }} — claudeops</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
<style>
  :root {
    --bg: #0b0d10;
    --panel: #14171c;
    --panel2: #0f1216;
    --hover: #1a1e25;
    --border: #232831;
    --border-soft: #1a1e26;
    --fg: #e6edf3;
    --muted: #8b949e;
    --dim: #6b7280;
    --accent: #58a6ff;
    --accent-soft: rgba(88, 166, 255, 0.12);
    --warm: #f0883e;
    --ok: #3fb950;
    --err: #f85149;
    --add: #56d364;
    --del: #f85149;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--fg);
    font: 13px/1.5 -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Helvetica, Arial, sans-serif;
    display: grid;
    grid-template-columns: 280px 1fr;
    grid-template-rows: 100vh;
    overflow: hidden;
  }
  body.has-right { grid-template-columns: 280px 1fr 380px; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  code, .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; }
  button, input[type=submit] {
    background: var(--accent); color: #0b0d10; border: 0; border-radius: 6px;
    padding: 6px 12px; font: inherit; font-weight: 500; cursor: pointer;
  }
  button:hover { filter: brightness(1.08); }
  button.ghost { background: transparent; color: var(--accent); border: 1px solid var(--border); font-weight: 400; }
  button.ghost:hover { background: var(--accent-soft); }
  button.danger { background: var(--err); color: #fff; }
  button.muted { background: var(--panel); color: var(--muted); border: 1px solid var(--border); font-weight: 400; }
  input[type=text], input[type=url], textarea, select {
    background: var(--panel); color: var(--fg); border: 1px solid var(--border);
    border-radius: 6px; padding: 7px 10px; font: inherit; width: 100%;
  }
  input:focus, textarea:focus { outline: none; border-color: var(--accent); }
  textarea { font-family: ui-monospace, SFMono-Regular, monospace; min-height: 200px; line-height: 1.5; }
  label { display: block; margin: 12px 0 4px; color: var(--muted); font-size: 12px; }
  hr { border: 0; border-top: 1px solid var(--border); margin: 16px 0; }

  /* main */
  main { overflow: hidden; display: flex; flex-direction: column; min-width: 0; }
  main.scroll { overflow-y: auto; padding: 24px 32px; }
  main header { margin-bottom: 18px; }
  main h2 { margin: 0; font-size: 17px; font-weight: 600; }
  main .crumb { color: var(--muted); font-size: 12px; margin-bottom: 4px; }

  /* tables */
  table.list { width: 100%; border-collapse: collapse; margin-top: 8px; }
  table.list th, table.list td {
    padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border-soft); vertical-align: top;
  }
  table.list th { color: var(--muted); font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; }
  table.list tr:hover td { background: var(--hover); }

  /* cards */
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin: 0 0 14px; }
  .card h3 { margin: 0 0 10px; font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 500; }
  .kvgrid { display: grid; grid-template-columns: 130px 1fr; row-gap: 6px; column-gap: 14px; }
  .kvgrid .k { color: var(--muted); }
  .kvgrid .v { font-family: ui-monospace, monospace; font-size: 12px; word-break: break-all; }

  .pill { display: inline-block; padding: 1px 7px; border-radius: 99px; font-size: 11px; font-weight: 500; }
  .pill.ok { background: rgba(63,185,80,0.18); color: var(--ok); }
  .pill.warn { background: rgba(240,136,62,0.18); color: var(--warm); }
  .pill.muted { background: rgba(139,148,158,0.15); color: var(--muted); }
  .pill.add { background: rgba(86,211,100,0.15); color: var(--add); }
  .pill.del { background: rgba(248,81,73,0.15); color: var(--del); }

  .preview { color: var(--fg); font-family: ui-monospace, monospace; font-size: 12px; max-width: 700px; }
  .preview .label { color: var(--muted); margin-right: 6px; }

  .flash { padding: 10px 14px; border-radius: 6px; margin-bottom: 14px; background: rgba(248,81,73,0.12); color: var(--err); border: 1px solid rgba(248,81,73,0.4); }
  .actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-top: 8px; }

  /* right pane */
  aside.right { border-left: 1px solid var(--border); background: var(--panel2); overflow-y: auto; padding: 16px; }
  aside.right h3 { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin: 0 0 12px; font-weight: 500; }

  /* file list */
  .file-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 8px; border-radius: 5px; }
  .file-row:hover { background: var(--hover); }
  .file-row .path { font-family: ui-monospace, monospace; font-size: 12px; color: var(--fg); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0; }
  .file-row .stats { display: flex; gap: 4px; flex-shrink: 0; margin-left: 8px; }
  .stat-add { color: var(--add); font-family: ui-monospace, monospace; font-size: 11px; }
  .stat-del { color: var(--del); font-family: ui-monospace, monospace; font-size: 11px; }
  .file-status { display: inline-block; width: 18px; text-align: center; font-family: ui-monospace, monospace; font-size: 10px; color: var(--muted); }

  /* terminal pane */
  .term-frame { flex: 1 1 auto; display: flex; flex-direction: column; background: #000; border-top: 1px solid var(--border); }
  .term-toolbar { display: flex; align-items: center; gap: 10px; padding: 6px 12px; background: var(--panel); border-bottom: 1px solid var(--border); font-size: 12px; }
  .term-toolbar .status { color: var(--muted); }
  .term-host { flex: 1 1 auto; padding: 8px; min-height: 0; }
  .term-host .xterm { height: 100%; }

  /* transcript */
  .msg { padding: 12px 14px; border-radius: 8px; margin: 6px 0; max-width: 760px; line-height: 1.55; }
  .msg.user { background: rgba(88,166,255,0.06); border-left: 2px solid var(--accent); }
  .msg.assistant { background: rgba(63,185,80,0.04); border-left: 2px solid var(--ok); }
  .msg.tool { background: var(--panel); border: 1px dashed var(--border); padding: 4px 10px; font-size: 11px; color: var(--muted); font-family: ui-monospace, monospace; max-width: 520px; }
  .msg .role { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 4px; display: flex; gap: 8px; align-items: center; }
  .msg .body { white-space: pre-wrap; font-family: ui-monospace, SFMono-Regular, monospace; font-size: 12px; color: var(--fg); }
</style>
</head>
<body{{ if .RightPane }} class="has-right"{{ end }}>
  {{ template "sidebar" . }}
  {{ template "main" . }}
  {{ if .RightPane }}{{ template "right" . }}{{ end }}
</body>
</html>
{{ end }}
